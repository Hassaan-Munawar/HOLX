<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLX Form</title>
    <link rel="shortcut icon" href="./Images/logo.png" type="image/x-icon">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group button {
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
        .loader {
            display: none;
            position: fixed;
            left: 45%;
            top: 45%;
            transform: translate(-50%, -50%);
            border: 16px solid #f3f3f3;
            border-radius: 50%;
            border-top: 16px solid #007bff;
            width: 120px;
            height: 120px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader"></div>
    <div class="container">
        <button onclick="window.history.back()" class="btn btn-success">Back</button>
        <button onclick="location.href = 'yourproducts.html'" style="float: right;" class="btn btn-warning">Your Products</button>
        <h2>Product Listing Form</h2>
        <div>
            <div class="form-group">
                <label>Category</label>
                <select required class="form-control" id="select">
                    <option selected disabled value="">Select Category</option>
                    <option value="1">Bikes</option>
                    <option value="2">Mobiles</option>
                    <option value="3">Property</option>
                    <option value="4">Vehicles</option>
                </select>
            </div>
            <div class="form-group">
                <label>Product Company Name</label>
                <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="form-group">
                <label>Product Description</label>
                <textarea class="form-control" id="productDesc" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label>Product Price</label>
                <input type="number" class="form-control" id="productPrice" required>
            </div>
            <div class="form-group">
                <label>Seller Name</label>
                <input disabled type="text" class="form-control" id="sellerName">
            </div>
            <div class="form-group">
                <label>Seller Contact Number</label>
                <input type="tel" class="form-control" id="sellerContact" required>
            </div>
            <div class="form-group">
                <label>Seller Address</label>
                <input type="text" class="form-control" id="sellerAddress" required>
            </div>
            <div class="form-group">
                <label>Product Image</label><br>
                <input required type="file" id="productImage">
            </div>
            <div class="form-group">
                <button id="form-btn" class="btn btn-primary btn-block">Submit</button>
            </div>
        </div>
    </div>

    <script type="module" src="./Js files/form.js"></script>
</body>
</html>
