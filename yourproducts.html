<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLX Your Pr</title>
    <link rel="shortcut icon" href="./Images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body style="overflow-x: hidden;">
    <header class="container-fluid">
        <div class="row justify-content-center align-items-center py-2 bg-white">
            <div class="col-6 col-md-2 text-center text-md-start">
                <div class="logo">HOLX</div>
            </div>
            <div class="col-12 col-md-8 d-flex align-items-center mt-2 mt-md-0">
                <div class="input-group">
                    <div style="margin-right: 5px;" class="input-group-prepend">
                        <span class="input-group-text bg-light border-0" id="basic-addon1">
                            <span>Pakistan</span>
                            <span>&#9662;</span>
                        </span>
                    </div>
                    <input type="text" id="inp" class="form-control" placeholder="Find ....." aria-label="Search"
                        aria-describedby="basic-addon1">
                    <button id="btn" class="btn btn-dark">
                        <img width="10px" src="./Images/search-icon-1023x1024-cz5u4134.png" alt="Search">
                    </button>
                </div>
            </div>
            <div class="col-6 col-md-2 text-center text-md-end mt-2 mt-md-0">
                <img hidden
                    style=" display: inline-block;width: 50px; border-radius: 25px; height: 50px; margin-top: 5px;margin-right: 10px;margin-bottom: 5px;"
                    id="profile" src="" alt="">
                <button id="signin" class="btn btn-primary">Login</button>
                <button id="sell" class="btn btn-primary sell-button">+ SELL</button>
            </div>
        </div>
        <div class="row bg-light py-2">
            <div class="col text-center">
                <nav>
                    <a style="text-decoration: none;" href="#" id="all-categories"
                        class="text-dark font-weight-bold">ALL CATEGORIES &#9662;</a>
                </nav>
            </div>
        </div>
        <div class="categories-dropdown" id="categories-dropdown">
            <div class="row">
                <div class="col-6 col-md-3">
                    <h3>Mobiles</h3>
                    <a href="mobiles.html">Mobile Phones</a>
                    <a href="mobiles.html">Accessories</a>
                    <a href="mobiles.html">Smart Watches</a>
                    <a href="mobiles.html">Tablets</a>
                </div>
                <div class="col-6 col-md-3">
                    <h3>Vehicles</h3>
                    <a href="vehicles.html">Cars</a>
                    <a href="vehicles.html">Buses, Vans & Trucks</a>
                    <a href="vehicles.html">Rickshaw & Chingchi</a>
                    <a href="vehicles.html">Tractors & Trailers</a>
                </div>
                <div class="col-6 col-md-3">
                    <h3>Bikes</h3>
                    <a href="bikes.html">Motorcycles</a>
                    <a href="bikes.html">Bicycles</a>
                    <a href="bikes.html">Bikes Accessories</a>
                    <a href="bikes.html">Scooters</a>
                </div>
                <div class="col-6 col-md-3">
                    <h3>Property</h3>
                    <a href="property.html">Rent</a>
                    <a href="property.html">Flats</a>
                    <a href="property.html">Banglows</a>
                    <a href="property.html">Farms</a>
                </div>
            </div>
        </div>
    </header>
    <button onclick="location.href ='index.html'" class="btn btn-warning m-4">Move To Main</button>
    <h1 class="m-3" style="display: flex;justify-content: center;align-items: center;">Your Products</h1>
    <div class="row" id="yourproducts"></div>
    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div style="display: flex; justify-content: space-between;align-items: center;" class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit Product</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="editForm">
                        <div class="form-group">
                            <label for="editName">Company Name </label>
                            <input type="text" class="form-control" id="editName">
                        </div>
                        <div class="form-group">
                            <label for="editImage">Image URL</label>
                            <input type="text" class="form-control" id="editImage">
                        </div>
                        <div class="form-group">
                            <label for="editPrice">Price</label>
                            <input type="text" class="form-control" id="editPrice">
                        </div>
                        <div class="form-group">
                            <label for="editDescription">Description</label>
                            <input type="text" class="form-control" id="editDescription">
                        </div>
                        <div class="form-group">
                            <label for="editAddress">Address</label>
                            <input type="text" class="form-control" id="editAddress">
                        </div>
                        <div class="form-group">
                            <label for="editContact">Contact No.</label>
                            <input type="text" class="form-control" id="editContact">
                        </div>
                        <input type="hidden" id="editDocId">
                        <input type="hidden" id="editCategory">
                        <input type="hidden" id="editSecondaryDocId">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">Save changes</button>
                </div>
            </div>
        </div>
    </div>





    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script type="module" src="app.js"></script>
    <script type="module" src="./Js files/yourproducts.js"></script>
</body>

</html>
