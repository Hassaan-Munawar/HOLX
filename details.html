<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLX Pr Details</title>
    <link rel="shortcut icon" href="./Images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="overflow-y: hidden;">
    <button id="back" class="m-2 btn btn-warning">Back</button>
    <div class="product-details">
            <img width="400px" id="product-image" src='' alt="Product Image">
        <div class="info">
            <div class="price">Price: <span id="product-price"></span></div>
            <div class="description">Description: <span id="product-description"></span></div>
            <div class="description">Company Name: <span id="product-companyname"></span></div>
            <div class="seller-info">Seller Name: <span id="seller-name"></span></div>
            <div class="seller-info">Seller Contact No.: <span id="seller-contact"></span></div>
            <div class="seller-info">Seller Address: <span id="seller-address"></span></div>
            <button class="add-to-cart" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>


    <script src="./Js files/details.js"></script>
</body>
</html>
